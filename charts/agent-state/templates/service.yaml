apiVersion: v1
kind: Service
metadata:
  name: {{ include "agent-state.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "agent-state.name" . }}
    helm.sh/chart: {{ include "agent-state.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "agent-state.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: grpc
      port: {{ .Values.service.port }}
      targetPort: grpc
      protocol: TCP
